name: Smoke Tests

on:
  push:
    branches:
      - develop
    paths:
      - 'cmd/**'
      - 'deploy/**'
      - 'internal/**'
      - 'test/**'
      - '**/*.mod'
      - '**/*.sum'
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install linters
        run: |
          make install-linters
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run tests
        run: |
          go test -v ./...

      - name: Run linter
        run: make lint

      - name: Install k3s
        run: |
          sudo mkdir -p /etc/rancher/k3s
          sudo cp test/smoke/k3s-registries.yaml /etc/rancher/k3s/registries.yaml
          curl -sfL https://get.k3s.io | sudo sh -s - --write-kubeconfig-mode 644 --disable=traefik --disable=helm-controller --disable=servicelb --disable=local-storage --disable=metrics-server

      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          sudo cp /etc/rancher/k3s/k3s.yaml "$HOME/.kube/config"
          sudo chown "$USER:$USER" "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"
          kubectl wait --for=condition=Ready node --all --timeout=120s

      - name: Wait for kubelet
        run: |
          for i in $(seq 1 30); do
            ready=$(kubectl get nodes -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
            if [ "$ready" = "True" ]; then
              break
            fi
            sleep 2
          done

          kubectl get nodes

          for i in $(seq 1 30); do
            if kubectl get serviceaccount default -n default >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

      - name: Start local registry
        run: |
          kubectl apply -f test/smoke/registry.yaml
          kubectl wait --for=condition=Ready pod/registry --timeout=120s

      - name: Build krun binaries
        run: |
          mkdir -p bin
          make build-linux VERSION=debug GOARCH=amd64 BUILDVCS=false
          mv krun bin/krun
          mv krun-helper bin/krun-helper
          chmod +x bin/krun
          chmod +x bin/krun-helper
          
          mkdir -p "$HOME/.krun"
          cat > "$HOME/.krun/config.json" <<EOF
          {
            "source": {
              "path": "${GITHUB_WORKSPACE}/apps",
              "search_depth": 1
            },
            "local_registry": "registry:5000",
            "remote_registry": "registry:5000"
          }
          EOF
          echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Build krun runtime images
        run: |
          docker build -f cmd/traffic-manager/Dockerfile -t 127.0.0.1:32000/krun-traffic-manager:latest .
          docker push 127.0.0.1:32000/krun-traffic-manager:latest
          docker build -f cmd/traffic-agent/Dockerfile -t 127.0.0.1:32000/krun-traffic-agent:latest .
          docker push 127.0.0.1:32000/krun-traffic-agent:latest

      - name: Build runtime manifests
        run: |
          kubectl kustomize deploy/runtime/overlays/local > /tmp/krun-runtime.yaml
          test -s /tmp/krun-runtime.yaml
          kubectl kustomize deploy/runtime/overlays/production > /tmp/krun-runtime-prod.yaml
          test -s /tmp/krun-runtime-prod.yaml

      - name: Create smoke app
        run: |
          mkdir -p apps/smoke-app
          cp test/smoke/krun.json apps/smoke-app/krun.json
          cp -R test/smoke/app apps/smoke-app/
          cp -R test/smoke/k8s apps/smoke-app/

      - name: Test krun version
        run: |
          output=$(krun version)
          echo "$output"
          echo "$output" | grep -q "debug"

      - name: Test krun install
        env:
          KRUN_AGENT_IMAGE: registry:5000/krun-traffic-agent:latest
        run: |
          python3 -m http.server 8000 --directory /tmp &
          HTTP_PID=$!
          trap "kill $HTTP_PID 2>/dev/null" EXIT
          for i in $(seq 1 20); do nc -z 127.0.0.1 8000 2>/dev/null && break; sleep 0.5; done

          export KRUN_MANIFEST_URL="http://localhost:8000/krun-runtime.yaml"
          output=$(krun install)
          echo "$output"
          echo "$output" | grep -q "traffic manager installed"
          echo "$output" | grep -q "helper service installed"

      - name: Debug krun install failure
        if: ${{ failure() }}
        run: |
          echo "[debug] runtime namespace"
          kubectl get namespace krun-system || true
          echo "[debug] runtime resources"
          kubectl get all -n krun-system || true
          echo "[debug] runtime deployment"
          kubectl get deployment krun-traffic-manager -n krun-system -o wide || true
          echo "[debug] runtime pod descriptions"
          kubectl describe pods -n krun-system || true
          echo "[debug] runtime pod logs"
          kubectl logs -n krun-system -l app.kubernetes.io/name=krun-traffic-manager --all-containers=true --tail=200 || true

      - name: Test krun-helper service availability
        run: |
          for i in $(seq 1 20); do
            if nc -z 127.0.0.1 47831 2>/dev/null; then
              echo "krun-helper daemon is ready"
              break
            fi
            sleep 0.5
          done
          nc -z 127.0.0.1 47831 || { echo "krun-helper daemon failed to start"; exit 1; }
          systemctl is-active krun-helper

      - name: Test krun status
        run: |
          output=$(krun status)
          echo "$output"

          check_section() {
            local section=$1
            local block
            block=$(echo "$output" | awk -v s="$section" '
              $0 == s { found = 1; next }
              found && /^-+$/ { next }
              found && !/:/ { exit }
              found { print }
            ')
            if ! echo "$block" | grep -Eq "service: .*installed"; then
              echo "ERROR: ${section} service is not 'installed'"
              exit 1
            fi
            if ! echo "$block" | grep -Eq "health: .*ok"; then
              echo "ERROR: ${section} health is not 'ok'"
              exit 1
            fi
          }

          check_section "krun-helper"
          check_section "traffic-manager"

          echo "All checks passed for krun-helper and traffic-manager"

      - name: Test krun list
        run: |
          output=$(krun list)
          echo "$output"
          echo "$output" | grep -q "smoke-app"

      - name: Test krun build
        run: |
          output=$(krun build smoke-app)
          echo "$output" | grep -q "Building project"

      - name: Test krun deploy
        run: |
          output=$(krun deploy --no-restart smoke-app)
          echo "$output"
          echo "$output" | grep -q "Deploying"
          kubectl wait --for=condition=Available deployment/smoke-app --timeout=120s

      - name: Debug smoke-app deploy failure
        if: ${{ failure() }}
        run: |
          echo "[debug] deployment summary"
          kubectl get deployment smoke-app -o wide || true
          echo "[debug] pod summary"
          kubectl get pods -l app=smoke-app -o wide || true
          echo "[debug] pod descriptions"
          kubectl describe pods -l app=smoke-app || true
          echo "[debug] pod logs"
          kubectl logs -l app=smoke-app --all-containers=true --tail=200 || true

      - name: Test krun debug enable
        run: |
          output=$(krun debug enable smoke-app)
          echo "$output"
          echo "$output" | grep -q "Session created"

          ready=0
          for i in $(seq 1 30); do
            names=$(kubectl get deployment smoke-app -o jsonpath='{.spec.template.spec.containers[*].name}' 2>/dev/null || true)
            count=$(echo "$names" | wc -w)
            available=$(kubectl get deployment smoke-app -o jsonpath='{.status.availableReplicas}' 2>/dev/null || true)
            echo "[poll $i/30] containers='$names' count=$count available='$available'"

            if [ "$count" = "2" ] && [ "$available" = "1" ]; then
              ready=1
              break
            fi
            sleep 2
          done

          if [ "$ready" != "1" ]; then
            echo "[debug] smoke-app did not become ready with sidecar"
            kubectl get deployment smoke-app -o yaml || true
            kubectl describe deployment smoke-app || true
            kubectl get pods -l app=smoke-app -o wide || true
            kubectl describe pods -l app=smoke-app || true
            kubectl get events --sort-by=.lastTimestamp --field-selector involvedObject.name=smoke-app || true
            kubectl logs -l app=smoke-app --all-containers=true --tail=200 || true
            exit 1
          fi

          echo "[debug] Loop passed: containers='$names' available='$available'"
          echo "[debug] Checking for krun-traffic-agent in container names..."
          echo "$names" | tr ' ' '\n'
          echo "$names" | tr ' ' '\n' | grep -q '^krun-traffic-agent$'

      - name: Test krun debug list
        run: |
          output=$(krun debug list)
          echo "$output"
          echo "$output" | grep -q "Active debug sessions"
          echo "$output" | grep -q "smoke-app"

      - name: Test debug communication
        run: |
          LOG=$(mktemp)
          python3 -m http.server 5000 --directory test/smoke/app >"$LOG" 2>&1 &
          INTERCEPT_PID=$!
          trap "kill $INTERCEPT_PID 2>/dev/null" EXIT
          for i in $(seq 1 20); do nc -z 127.0.0.1 5000 2>/dev/null && break; sleep 0.5; done

          kubectl run curl-smoke --rm -i --restart=Never --image=curlimages/curl:latest \
            --command -- curl -sS --max-time 30 http://smoke-app.default.svc.cluster.local/ || true

          for i in $(seq 1 20); do
            grep -q '"GET / HTTP' "$LOG" && break
            sleep 0.5
          done

          echo "--- listener log ---"
          cat "$LOG"
          grep -q '"GET / HTTP' "$LOG" || { echo "ERROR: GET did not arrive on port 5000"; exit 1; }

      - name: Debug communication failure
        if: ${{ failure() }}
        run: |
          echo "[debug] smoke-app pods"
          kubectl get pods -l app=smoke-app -o wide || true
          POD=$(kubectl get pod -l app=smoke-app -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          POD_IP=$(kubectl get pod -l app=smoke-app -o jsonpath='{.items[0].status.podIP}' 2>/dev/null || true)
          echo "[debug] pod=$POD ip=$POD_IP"

          echo "[debug] iptables -t nat -L PREROUTING in sidecar"
          kubectl exec "$POD" -c krun-traffic-agent -- iptables -t nat -L PREROUTING -n -v || true
          echo "[debug] iptables-save (nat) in sidecar"
          kubectl exec "$POD" -c krun-traffic-agent -- iptables-save -t nat || true
          echo "[debug] listening sockets in sidecar netns"
          kubectl exec "$POD" -c krun-traffic-agent -- sh -c 'ss -tlnp 2>/dev/null || netstat -tlnp 2>/dev/null' || true

          echo "[debug] curl pod IP directly (:80)"
          curl -sSi --max-time 10 "http://${POD_IP}:80/" || true
          echo "[debug] curl pod IP on agent port (:8081)"
          curl -sSi --max-time 10 "http://${POD_IP}:8081/" || true

          echo "[debug] traffic-agent logs"
          kubectl logs -l app=smoke-app -c krun-traffic-agent --tail=200 || true
          echo "[debug] traffic-manager logs"
          kubectl logs -n krun-system -l app.kubernetes.io/name=krun-traffic-manager --tail=200 || true
          echo "[debug] krun-helper status"
          systemctl status krun-helper --no-pager || true
          echo "[debug] krun-helper journal"
          journalctl -u krun-helper --no-pager --since "5 minutes ago" || true
          echo "[debug] active debug sessions"
          krun debug list || true

      - name: Test krun debug disable
        run: |
          output=$(krun debug disable smoke-app)
          echo "$output"
          echo "$output" | grep -q "Session removed"
          
          for i in $(seq 1 30); do
            count=$(kubectl get deployment smoke-app -o jsonpath='{.spec.template.spec.containers[*].name}' 2>/dev/null | wc -w)
            if [ "$count" = "1" ]; then
              break
            fi
            sleep 2
          done
          test "$(kubectl get deployment smoke-app -o jsonpath='{.spec.template.spec.containers[*].name}' 2>/dev/null | wc -w)" = "1" || true

      - name: Test krun delete
        run: |
          output=$(krun delete smoke-app)
          echo "$output"
          echo "$output" | grep -q "Deleting smoke-app"
          kubectl wait --for=delete deployment/smoke-app --timeout=120s || true

      - name: Test krun uninstall
        env:
          KRUN_MANIFEST_URL: http://localhost:8000/krun-runtime.yaml
        run: |
          python3 -m http.server 8000 --directory /tmp &
          HTTP_PID=$!
          trap "kill $HTTP_PID 2>/dev/null" EXIT
          for i in $(seq 1 20); do nc -z 127.0.0.1 8000 2>/dev/null && break; sleep 0.5; done

          output=$(krun uninstall)
          echo "$output"
          echo "$output" | grep -q "traffic manager uninstalled"
          echo "$output" | grep -q "helper service uninstalled"
          kubectl wait --for=delete deployment/krun-traffic-manager -n krun-system --timeout=120s || true
          kubectl wait --for=delete namespace/krun-system --timeout=120s || true
          ! systemctl is-active krun-helper 2>/dev/null
