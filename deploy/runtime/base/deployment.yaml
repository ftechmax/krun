apiVersion: apps/v1
kind: Deployment
metadata:
  name: krun-traffic-manager
  namespace: krun-system
  labels:
    app.kubernetes.io/name: krun-traffic-manager
    app.kubernetes.io/component: traffic-manager
    app.kubernetes.io/part-of: krun-debug-runtime
    app.kubernetes.io/managed-by: krun
    krun.ftechmax/runtime: "true"
  annotations:
    krun.ftechmax/component: traffic-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: krun-traffic-manager
      app.kubernetes.io/component: traffic-manager
      app.kubernetes.io/part-of: krun-debug-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: krun-traffic-manager
        app.kubernetes.io/component: traffic-manager
        app.kubernetes.io/part-of: krun-debug-runtime
        app.kubernetes.io/managed-by: krun
        krun.ftechmax/runtime: "true"
      annotations:
        krun.ftechmax/component: traffic-runtime
    spec:
      serviceAccountName: krun-traffic-manager
      containers:
        - name: manager
          image: docker.io/ftechmax/krun-traffic-manager:latest
          imagePullPolicy: IfNotPresent
          env: []
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
